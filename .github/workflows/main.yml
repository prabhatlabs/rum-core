name: Release Client Script

on:
  push:
    branches: [main]
    paths:
      - 'packages/script/src/**'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build script
        run: bun run build:script

      - name: Checkout script repo
        uses: actions/checkout@v4
        with:
          repository: IsayAyase/rum-core-client-script  # separate repo
          token: ${{ secrets.SCRIPT_REPO_TOKEN }}
          path: client-script-repo

      - name: Copy build to script repo
        run: cp packages/script/dist/rum-core.js client-script-repo/dist/rum-core.js

      - name: Bump version & push
        run: |
          cd script-repo
          VERSION=$(node -p "require('../packages/script/package.json').version")
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist/rum-core.js
          git commit -m "chore: release v$VERSION"
          git tag v$VERSION
          git push && git push --tags
