name: Release Client Script

on:
  push:
    branches: [main]
    paths:
      - 'packages/script/src/**'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build script
        run: bun run build:script

      - name: Checkout script repo
        uses: actions/checkout@v5
        with:
          repository: IsayAyase/rum-core-client-script  # separate repo
          token: ${{ secrets.SCRIPT_REPO_TOKEN }}
          path: client-script-repo

      - name: Copy build to script repo
        run: cp packages/script/dist/rum-core.js client-script-repo/dist/rum-core.js

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/script/package.json').version")" >> $GITHUB_OUTPUT

      - name: Bump version & push
        run: |
          cd client-script-repo
          git remote set-url origin https://x-access-token:${{ secrets.SCRIPT_REPO_TOKEN }}@github.com/IsayAyase/rum-core-client-script.git
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist/rum-core.js
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag v${{ steps.version.outputs.version }}
          git push && git push --tags
